[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [".venv", "data", "docker"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]
ignore = [
    "B008",
]

[tool.ruff.lint.isort]
known-first-party = ["agent", "app", "evals", "ingestion", "retrieval"]
